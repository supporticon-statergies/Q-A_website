name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create config file from secrets
        run: |
          cat > config.js << EOF
          const GITHUB_TOKEN = "${{ secrets.GH_PAT }}";
          const GITHUB_OWNER = "${{ github.repository_owner }}";
          const GITHUB_REPO  = "${{ github.event.repository.name }}";
          const FILE_PATH    = "data/submissions.xlsx";
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  ./
