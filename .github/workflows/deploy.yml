name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create config.js from secrets
        run: |
          cat > config.js <<'ENDOFCONFIG'
          const GITHUB_TOKEN = "PLACEHOLDER_TOKEN";
          const GITHUB_OWNER = "PLACEHOLDER_OWNER";
          const GITHUB_REPO  = "PLACEHOLDER_REPO";
          const FILE_PATH    = "data/submissions.xlsx";
          ENDOFCONFIG
          sed -i "s|PLACEHOLDER_TOKEN|${{ secrets.GH_PAT }}|g"                    config.js
          sed -i "s|PLACEHOLDER_OWNER|${{ github.repository_owner }}|g"            config.js
          sed -i "s|PLACEHOLDER_REPO|${{ github.event.repository.name }}|g"        config.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
